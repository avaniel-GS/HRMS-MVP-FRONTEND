<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>HRMS AVANIEL COLLECTIVE (MVP)</title>
</head>
<body>
  <aside>
    <header class="aside-header">
      <p>HR Portal</p>
    </header>
    <section class="aside-options">
        <button class="aside-btn">
          <img src="assets/dashboard-icon.svg" class="dashboard-icon">
          <p>Dashboard</p>
        </button>
        <button class="aside-btn">
          <img src="assets/employee-icon.svg" class="employee-icon">
          <p>Employees</p>
        </button>
        <button class="aside-btn">
          <img src="assets/leave-icon.svg" class="leave-icon">
          <p>Leave</p>
        </button>
        <button class="aside-btn">
          <img src="assets/settings-icon.svg" class="settings-icon">
          <p>Settings</p>
        </button>
    </section>
  </aside>
  <main>
    <button class="hamburger-btn" id="hamburger_btn" type="button" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <header>
      <h1>HR Admin Dashboard</h1>
      <p>Manage your team and leave requests</p>
    </header>

    <section class="data-cards">

      <div class="data-card">
        <div class="heading">
          <img src="assets/people.png" alt="People Icon">
          <p>Total Headcount</p>
        </div>
        <div>
          <p id="total-headcount">0</p>
        </div>
      </div>

      <div class="data-card">
        <div class="heading">
          <img src="assets/departments.png" alt="Departments Icon">
          <p>Departments</p>
        </div>
        <div>
          <p id="dept-count">0</p>
        </div>
      </div>

      <div class="data-card">
        <div class="heading">
          <img src="assets/pending.png" alt="Pending Icon">
          <p>Pending Leave</p>
        </div>
        <div>
          <p id="pending-leave">0</p>
        </div>
      </div>

      <div class="data-card">
        <div class="heading">
          <img src="assets/approved.png" alt="Approved Icon">
          <p>Approved</p>
        </div>
        <div>
          <p id="approved-leave">0</p>
        </div>
      </div>

    </section>

    <section class="Employee-card">
      <p>Employees</p>
      <button class="add_button" id="employee_add">+</button>
    </section>

    <section class="add-employee-form" id="add_employee_form">

      <h2>Add Employee</h2>

      <form id="employee_form" method="post" class="employee_form">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" class="input_box" required>
        <label for="role">Role</label>
        <input type="text" id="role" name="role" class="input_box" required>
        <label for="department">Department</label>
        <input type="text" id="department" name="department" class="input_box" required>
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="input_box" required>
        <label for="date_of_joining">Join Date</label>
        <input type="date" id="date_of_joining" name="date_of_joining" class="input_box" required>
        <div class="form-btn">
          <button class="save-button" type="submit">
            Save
          </button>
          <button class="cancel-btn" id="cancel-btn" type="button">Cancel</button>
        </div>
      </form>

    </section>

    <section class="employee-list-section" aria-label="Added employees">
      <div class="employee-cards" id="employee_cards">
        <div class="employee-card-empty"></div>
      </div>
    </section>

    <section class="PLV-Card">
      <p>Pending Leave Requests</p>
    </section>

  </main>
  <script src="script.js"></script>
</body>
</html>
