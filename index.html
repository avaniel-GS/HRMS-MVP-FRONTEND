<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <main>
    <header>
      <h1>HR Admin Dashboard</h1>
      <p>Manage your team and leave requests</p>
    </header>
    <section class="data-cards"> 
      <div class="data-card">
        <div class="heading">
          <img src="assets/people.png" alt="People Icon">
          <p>Total Headcount</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/departments.png" alt="Departments Icon">
          <p>Departments</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/pending.png" alt="Pending Icon">
          <p>Pending Leave</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/approved.png" alt="Approved Icon">
          <p>Approved</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
    </section>
    <section class="Employee-card">
      <p>Employees</p>
      <button class="add_button" id="employee_add">+</button>
    </section>
    <section class="add-employee-form" id="add_employee_form">
      <h2>Add Employee</h2>
      <form action="post" class="employee_form">
        <label for="name">Name</label>
        <input type="text" id="name" class="input_box">
        <label for="role">Role</label>
        <input type="text" id="role" class="input_box">
        <label for="department">Department</label>
        <input type="text" id="department" class="input_box">
        <label for="email">Email</label>
        <input type="email" id="email" class="input_box">
        <label for="start_date">Join Date</label>
        <input type="date" id="start_date" class="input_box">
      </form>
      <div class="form-btn">
        <button class="save-button">
          Save
        </button>
        <button class="cancel-btn" id="cancel-btn">Cancel</button>
      </div>
    </section>
    <section class="PLV-Card">
      <p>Pending Leave Requests</p>
    </section>
  </main>
  <aside>
    <header class="aside-header">
      <h1>HR Portal</h1>
    </header>
    <section class="aside-options">
      <div>
        <button>Dashboard</button>
      </div>
      <div>
        <button>Employees</button>
      </div>
      <div>
        <button>leave</button>
      </div>
      <div>
        <button>Settings</button>
      </div>
    </section>
  </aside>
  <script src="script.js"></script>
</body>
</html>
