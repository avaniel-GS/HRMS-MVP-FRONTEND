<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Document</title>
</head>
<body>
  <main>
    <header>
      <h1>HR Admin Dashboard</h1>
      <p>Manage your team and leave requests</p>
    </header>
    <section class="data-cards"> 
      <div class="data-card">
        <div class="heading">
          <img src="assets/people.png" alt="People Icon">
          <p>Total Headcount</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/departments.png" alt="Departments Icon">
          <p>Departments</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/pending.png" alt="Pending Icon">
          <p>Pending Leave</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
      <div class="data-card">
        <div class="heading">
          <img src="assets/approved.png" alt="Approved Icon">
          <p>Approved</p>
        </div>
        <div>
          <p>0</p>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
